<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dew You Really Want to Run?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="styles.css" rel="stylesheet" type="text/css">
  <script src="weather.js" defer></script>
</head>

<body>

  <div class="wrapper-main">

    <h1 class="headline">
      <span class="headline-primary">Dew You</span>
      <span class="headline-secondary">Really Want to Run?</span>
    </h1>

    <form class="search-form input">
      <div class="input-group">
        <label for="city-input" class="visually-hidden">Search for city</label>
        <span class="input-icon material-symbols-outlined" aria-hidden="true">location_on</span>
        <input
          type="text"
          id="city-input"
          class="inputValue"
          placeholder="Search for city"
          autocomplete="off"
          role="combobox"
          aria-expanded="false"
          aria-autocomplete="list"
          aria-controls="city-suggestions"
        >
        <button type="button" class="clear-button" aria-label="Clear search" hidden>
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
        <ul id="city-suggestions" class="suggestions" role="listbox" hidden></ul>
      </div>
    </form>
    <div class="error" role="alert"></div>

    <div class="display" hidden>
      <div class="card card-location">
        <p class="name"></p>
        <p class="icon material-symbols-outlined" role="img"></p>
        <p class="desc"></p>
      </div>

      <div class="card card-metrics">
        <div class="metric">
          <span class="metric-icon material-symbols-outlined" aria-hidden="true">thermostat</span>
          <span class="metric-label">Temperature</span>
          <span class="temp metric-value"></span>
          <span class="feelsLike metric-sublabel"></span>
        </div>
        <div class="metric-divider" aria-hidden="true"></div>
        <div class="metric">
          <span class="metric-icon material-symbols-outlined" aria-hidden="true">humidity_percentage</span>
          <span class="metric-label">Humidity</span>
          <span class="humid metric-value"></span>
        </div>
      </div>

      <div class="card card-dew">
        <span class="metric-icon material-symbols-outlined" aria-hidden="true">water_drop</span>
        <div class="dew-body">
          <span class="metric-label">Dew Point</span>
          <span class="dew metric-value" aria-live="polite"></span>
        </div>
        <div class="metric-divider" aria-hidden="true"></div>
        <p class="dewDescription"></p>
      </div>

      <div class="card card-message">
        <span class="message-icon material-symbols-outlined" aria-hidden="true">directions_run</span>
        <p class="runMessage" aria-live="polite"></p>
      </div>
    </div>

  </div>

  <footer class="footer">
    <p>&copy; <span id="currentYear"></span> Muffin & Squirrel</p>
  </footer>

</body>
</html>
