<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dew You Really Want to Run?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet" type="text/css">
  <script src="weather.js" defer></script>
</head>

<body>

  <div class="wrapper-main">

    <h1 class="headline">
      <span class="headline-primary">Dew You</span>
      <span class="headline-secondary">Really Want to Run?</span>
    </h1>

    <form class="search-form input">
      <div class="input-group">
        <label for="city-input" class="visually-hidden">City or zip code</label>
        <span class="input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-7.58-7-12a7 7 0 0 1 14 0c0 4.42-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
        </span>
        <input
          type="text"
          id="city-input"
          class="inputValue"
          placeholder="City or zip code"
          autocomplete="off"
          role="combobox"
          aria-expanded="false"
          aria-autocomplete="list"
          aria-controls="city-suggestions"
        >
        <button type="button" class="clear-button" aria-label="Clear search" hidden>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg>
        </button>
        <ul id="city-suggestions" class="suggestions" role="listbox" hidden></ul>
      </div>
      <button type="submit" class="button">Submit</button>
    </form>
    <div class="error" role="alert"></div>

    <div class="display" hidden>
      <div class="card card-location">
        <p class="name"></p>
        <p class="icon"></p>
        <p class="desc"></p>
      </div>

      <div class="card card-metrics">
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V4a2 2 0 0 0-4 0v10.76a4 4 0 1 0 4 0z"/></svg>
          </span>
          <span class="metric-label">Temperature</span>
          <span class="temp metric-value"></span>
        </div>
        <div class="metric-divider" aria-hidden="true"></div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s6 7.2 6 11a6 6 0 0 1-12 0c0-3.8 6-11 6-11z"/></svg>
          </span>
          <span class="metric-label">Humidity</span>
          <span class="humid metric-value"></span>
        </div>
      </div>

      <div class="card card-dew">
        <span class="metric-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3s6 7.2 6 11a6 6 0 0 1-12 0c0-1.9 1.4-4.7 3-7.2"/><path d="M8.5 9.5c-1 1.6-1.7 3-1.7 4"/></svg>
        </span>
        <div class="dew-body">
          <span class="metric-label">Dew Point</span>
          <span class="dew metric-value" aria-live="polite"></span>
        </div>
        <div class="metric-divider" aria-hidden="true"></div>
        <p class="dewDescription"></p>
      </div>

      <div class="card card-message">
        <span class="message-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><circle cx="14" cy="4" r="2"/><path d="M10.8 8.3 7 10l1 2 2.6-1.1 1 1.8-2.3 4.6 1.8.9 2.6-5.2 1.6.7 1 3.6 1.9-.6-1.1-3.9-2.1-1-3-2.1z"/></svg>
        </span>
        <p class="runMessage" aria-live="polite"></p>
      </div>
    </div>

  </div>

  <footer class="footer">
    <p>&copy; <span id="currentYear"></span> Muffin & Squirrel</p>
  </footer>

</body>
</html>
